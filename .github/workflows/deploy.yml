name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4

    - name: Generate firebase-config.js from secrets
      run: |
        cat > js/firebase-config.js << 'EOF'
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getStorage } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

        const firebaseConfig = {
          apiKey: "${{ secrets.FIREBASE_API_KEY }}",
          authDomain: "brewerscup-77eaa.firebaseapp.com",
          projectId: "brewerscup-77eaa",
          storageBucket: "brewerscup-77eaa.firebasestorage.app",
          messagingSenderId: "744456728157",
          appId: "1:744456728157:web:0b2ddb1db643fb4c6ee7b4"
        };

        console.log('Firebase config module loading...');

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        console.log('Firebase initialized successfully');

        // Initialize Firestore
        const db = getFirestore(app);
        console.log('Firestore initialized successfully');

        // Initialize Storage
        const storage = getStorage(app);
        console.log('Firebase Storage initialized successfully');

        // Export for use in other modules
        export { app, db, storage };
        EOF

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: github-pages
        path: '.'
        retention-days: 1

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v3

